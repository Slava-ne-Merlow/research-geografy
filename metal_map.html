<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Метал по странам мира</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; padding: 24px; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #555; margin-bottom: 16px; }
.controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.legend-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555; }
#legend { display: flex; gap: 2px; }
#tooltip {
  display: none; position: fixed;
  background: #fff; border: 1px solid #ccc;
  border-radius: 8px; padding: 8px 12px;
  font-size: 13px; pointer-events: none; z-index: 100;
}
#tt-name { font-weight: 500; color: #1a1a1a; margin-bottom: 2px; }
#tt-bands, #tt-rate { color: #555; }
#map { width: 100%; height: auto; display: block; }
.source { font-size: 11px; color: #888; margin-top: 12px; }
@media (max-width: 600px) {
  body { padding: 12px; }
  h1 { font-size: 17px; }
  .subtitle { font-size: 12px; margin-bottom: 10px; }
  .controls { margin-bottom: 8px; }
  .legend-wrap { font-size: 11px; }
}
</style>
</head>
<body>
<h1>Метал по странам мира</h1>
<p class="subtitle">Количество метал-групп на 100 000 населения · данные: Encyclopaedia Metallum</p>

<div class="controls">
  <div class="legend-wrap">
    <span>меньше</span>
    <div id="legend"></div>
    <span>больше</span>
    <span style="margin-left:8px; color:#888;">групп / 100к чел.</span>
  </div>
</div>

<div id="tooltip">
  <div id="tt-name"></div>
  <div id="tt-bands"></div>
  <div id="tt-rate"></div>
</div>

<svg id="map" viewBox="0 0 960 500"></svg>
<p class="source">Источник: Encyclopaedia Metallum (metal-archives.com) · данные приблизительные</p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const metalData = {
  "FIN": { name: "Финляндия", bands: 3175, pop: 5.5 },
  "NOR": { name: "Норвегия", bands: 2040, pop: 5.4 },
  "SWE": { name: "Швеция", bands: 3200, pop: 10.4 },
  "ISL": { name: "Исландия", bands: 180, pop: 0.37 },
  "DNK": { name: "Дания", bands: 900, pop: 5.9 },
  "USA": { name: "США", bands: 12000, pop: 331 },
  "DEU": { name: "Германия", bands: 5800, pop: 83 },
  "GBR": { name: "Великобритания", bands: 4500, pop: 67 },
  "BRA": { name: "Бразилия", bands: 3100, pop: 215 },
  "CAN": { name: "Канада", bands: 2400, pop: 38 },
  "AUS": { name: "Австралия", bands: 1700, pop: 26 },
  "NLD": { name: "Нидерланды", bands: 1400, pop: 17.6 },
  "ITA": { name: "Италия", bands: 2000, pop: 60 },
  "FRA": { name: "Франция", bands: 2100, pop: 68 },
  "ESP": { name: "Испания", bands: 1600, pop: 47 },
  "POL": { name: "Польша", bands: 1800, pop: 38 },
  "CHE": { name: "Швейцария", bands: 750, pop: 8.7 },
  "AUT": { name: "Австрия", bands: 650, pop: 9 },
  "BEL": { name: "Бельгия", bands: 700, pop: 11.6 },
  "CZE": { name: "Чехия", bands: 900, pop: 10.9 },
  "GRC": { name: "Греция", bands: 800, pop: 10.7 },
  "PRT": { name: "Португалия", bands: 600, pop: 10.3 },
  "ARG": { name: "Аргентина", bands: 1200, pop: 45 },
  "MEX": { name: "Мексика", bands: 1100, pop: 130 },
  "COL": { name: "Колумбия", bands: 500, pop: 51 },
  "CHL": { name: "Чили", bands: 600, pop: 19 },
  "JPN": { name: "Япония", bands: 1400, pop: 125 },
  "RUS": { name: "Россия", bands: 2100, pop: 144 },
  "UKR": { name: "Украина", bands: 700, pop: 44 },
  "HUN": { name: "Венгрия", bands: 500, pop: 9.7 },
  "SVK": { name: "Словакия", bands: 400, pop: 5.5 },
  "SRB": { name: "Сербия", bands: 350, pop: 6.9 },
  "HRV": { name: "Хорватия", bands: 350, pop: 3.9 },
  "SVN": { name: "Словения", bands: 230, pop: 2.1 },
  "EST": { name: "Эстония", bands: 230, pop: 1.3 },
  "LVA": { name: "Латвия", bands: 170, pop: 1.8 },
  "LTU": { name: "Литва", bands: 200, pop: 2.8 },
  "NZL": { name: "Нов. Зеландия", bands: 320, pop: 5.1 },
  "ZAF": { name: "ЮАР", bands: 350, pop: 60 },
  "ISR": { name: "Израиль", bands: 300, pop: 9.5 },
  "TUR": { name: "Турция", bands: 400, pop: 85 },
  "IDN": { name: "Индонезия", bands: 500, pop: 277 },
  "PHL": { name: "Филиппины", bands: 300, pop: 115 },
  "IND": { name: "Индия", bands: 600, pop: 1400 },
  "CHN": { name: "Китай", bands: 400, pop: 1400 },
  "KOR": { name: "Юж. Корея", bands: 300, pop: 52 },
  "MYS": { name: "Малайзия", bands: 200, pop: 33 },
  "BGR": { name: "Болгария", bands: 300, pop: 6.5 },
  "ROU": { name: "Румыния", bands: 450, pop: 19 },
  "BLR": { name: "Беларусь", bands: 250, pop: 9.4 },
  "IRL": { name: "Ирландия", bands: 350, pop: 5 },
  "LUX": { name: "Люксембург", bands: 100, pop: 0.65 },
  "MKD": { name: "Македония", bands: 90, pop: 2.1 },
  "BIH": { name: "Босния", bands: 130, pop: 3.3 },
  "ALB": { name: "Албания", bands: 60, pop: 2.8 },
  "MNE": { name: "Черногория", bands: 50, pop: 0.62 },
  "PER": { name: "Перу", bands: 250, pop: 33 },
  "VEN": { name: "Венесуэла", bands: 200, pop: 32 },
  "URY": { name: "Уругвай", bands: 130, pop: 3.5 },
  "PRY": { name: "Парагвай", bands: 80, pop: 7.4 },
  "BOL": { name: "Боливия", bands: 80, pop: 12 },
  "ECU": { name: "Эквадор", bands: 120, pop: 18 },
  "GTM": { name: "Гватемала", bands: 70, pop: 17 },
  "CRI": { name: "Коста-Рика", bands: 90, pop: 5.2 },
  "EGY": { name: "Египет", bands: 100, pop: 104 },
  "IRN": { name: "Иран", bands: 120, pop: 87 },
  "PAK": { name: "Пакистан", bands: 80, pop: 230 },
  "THA": { name: "Таиланд", bands: 200, pop: 72 },
  "MAR": { name: "Марокко", bands: 60, pop: 37 },
  "NGA": { name: "Нигерия", bands: 50, pop: 220 },
  "KEN": { name: "Кения", bands: 40, pop: 55 },
};

function getRate(iso) {
  const d = metalData[iso];
  if (!d || d.pop === 0) return 0;
  return d.bands / d.pop;
}

const thresholds = [0.5, 1, 2, 5, 10, 20, 40];
const colors = ["#f0f0f0","#d4c5e2","#b89fd0","#9374bb","#6e3fa3","#4a1a7a","#2d0752","#1a0035"];

function getColor(rate) {
  if (rate === 0) return "#c8c8c8";
  for (let i = 0; i < thresholds.length; i++) {
    if (rate < thresholds[i]) return colors[i];
  }
  return colors[colors.length - 1];
}

const legend = document.getElementById("legend");
colors.forEach(c => {
  const s = document.createElement("div");
  s.style.cssText = `width:20px;height:13px;background:${c};border-radius:2px;`;
  legend.appendChild(s);
});

const svg = d3.select("#map");
const tooltip = document.getElementById("tooltip");

const projection = d3.geoNaturalEarth1().scale(153).translate([480, 250]);
const path = d3.geoPath().projection(projection);

const isoMap = {
  "246":"FIN","578":"NOR","752":"SWE","352":"ISL","208":"DNK",
  "840":"USA","276":"DEU","826":"GBR","076":"BRA","124":"CAN",
  "036":"AUS","528":"NLD","380":"ITA","250":"FRA","724":"ESP",
  "616":"POL","756":"CHE","040":"AUT","056":"BEL","203":"CZE",
  "300":"GRC","620":"PRT","032":"ARG","484":"MEX","170":"COL",
  "152":"CHL","392":"JPN","643":"RUS","804":"UKR","348":"HUN",
  "703":"SVK","688":"SRB","191":"HRV","705":"SVN","233":"EST",
  "428":"LVA","440":"LTU","554":"NZL","710":"ZAF","376":"ISR",
  "792":"TUR","360":"IDN","608":"PHL","356":"IND","156":"CHN",
  "410":"KOR","458":"MYS","702":"SGP","100":"BGR","642":"ROU",
  "112":"BLR","372":"IRL","442":"LUX","807":"MKD","070":"BIH",
  "008":"ALB","499":"MNE","604":"PER","862":"VEN","858":"URY",
  "600":"PRY","068":"BOL","218":"ECU","320":"GTM","188":"CRI",
  "818":"EGY","364":"IRN","586":"PAK","764":"THA","504":"MAR",
  "566":"NGA","404":"KEN"
};

fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json")
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    svg.selectAll("path")
      .data(countries.features)
      .join("path")
      .attr("d", path)
      .attr("stroke", "#0f0f1a")
      .attr("stroke-width", 0.5)
      .attr("fill", d => {
        const iso = isoMap[String(d.id).padStart(3,"0")];
        return getColor(getRate(iso));
      })
      .on("mousemove", function(event, d) {
        const iso = isoMap[String(d.id).padStart(3,"0")];
        const info = iso ? metalData[iso] : null;
        if (info && info.bands > 0) {
          const rate = (info.bands / info.pop).toFixed(1);
          document.getElementById("tt-name").textContent = info.name;
          document.getElementById("tt-bands").textContent = `Групп: ${info.bands.toLocaleString()}`;
          document.getElementById("tt-rate").textContent = `На 100к чел.: ${rate}`;
        } else {
          document.getElementById("tt-name").textContent = info ? info.name : "Нет данных";
          document.getElementById("tt-bands").textContent = "";
          document.getElementById("tt-rate").textContent = "";
        }
        tooltip.style.display = "block";
        tooltip.style.left = (event.clientX + 14) + "px";
        tooltip.style.top = (event.clientY - 10) + "px";
      })
      .on("mouseleave", () => { tooltip.style.display = "none"; })
      .on("touchstart", function(event, d) {
        const touch = event.touches[0];
        const iso = isoMap[String(d.id).padStart(3,"0")];
        const info = iso ? metalData[iso] : null;
        if (info && info.bands > 0) {
          const rate = (info.bands / info.pop).toFixed(1);
          document.getElementById("tt-name").textContent = info.name;
          document.getElementById("tt-bands").textContent = `Групп: ${info.bands.toLocaleString()}`;
          document.getElementById("tt-rate").textContent = `На 100к чел.: ${rate}`;
        } else {
          document.getElementById("tt-name").textContent = info ? info.name : "Нет данных";
          document.getElementById("tt-bands").textContent = "";
          document.getElementById("tt-rate").textContent = "";
        }
        tooltip.style.left = Math.min(touch.clientX + 14, window.innerWidth - 160) + "px";
        tooltip.style.top = Math.max(touch.clientY - 70, 10) + "px";
        tooltip.style.display = "block";
        clearTimeout(tooltip._t);
        tooltip._t = setTimeout(() => { tooltip.style.display = "none"; }, 2500);
      }, {passive: true});
  });
</script>
</body>
</html>
