<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Где родились музыкальные жанры</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1a1a1a; padding: 28px; }
h1 { font-size: 22px; font-weight: 700; letter-spacing: 2px; margin-bottom: 6px; }
.sub { font-size: 14px; color: #555; margin-bottom: 18px; }
#map-wrap { position: relative; width: 100%; }
svg { width: 100%; height: auto; display: block; cursor: default; }
.country-path { fill: #c8c8c8; stroke: #e0e0e0; stroke-width: 0.4; }
.country-path:hover { fill: #b8b8b8; }
.genre-dot { cursor: pointer; transition: r 0.15s; }
.genre-dot:hover { r: 11; }
#tooltip {
  display: none; position: absolute;
  background: #fff; border: 1px solid #ccc;
  border-radius: 10px; padding: 10px 14px;
  font-size: 13px; pointer-events: none; z-index: 20;
  max-width: 220px;
}
#tt-genre { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
#tt-city { font-size: 12px; color: #555; margin-bottom: 6px; }
#tt-desc { font-size: 12px; color: #444; line-height: 1.5; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #555;
  background: #ebebeb; border-radius: 6px; padding: 5px 10px; }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.legend-era { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #888; }
</style>
</head>
<body>
<h1>ГДЕ РОДИЛИСЬ МУЗЫКАЛЬНЫЕ ЖАНРЫ</h1>
<p class="sub">Место и время рождения жанра · нажми на точку, чтобы узнать историю</p>

<div id="map-wrap">
  <div id="tooltip">
    <div id="tt-genre"></div>
    <div id="tt-city"></div>
    <div id="tt-desc"></div>
  </div>
  <svg id="map" viewBox="0 0 960 500"></svg>
</div>

<div class="legend" id="legend"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const genres = [
  { name: "Блюз",        city: "Дельта Миссисипи, США", lon: -90.5, lat: 33.4,
    year: "~1900-е", color: "#4A90D9",
    desc: "Вырос из музыки афроамериканских рабочих на хлопковых плантациях. Корень всего современного рока и джаза." },
  { name: "Джаз",        city: "Новый Орлеан, США",      lon: -90.0, lat: 29.9,
    year: "~1910-е", color: "#F5A623",
    desc: "Смесь блюза, регтайма и европейской гармонии в портовом городе с невероятным культурным смешением." },
  { name: "Рок-н-ролл",  city: "Мемфис / Чикаго, США",   lon: -90.0, lat: 35.1,
    year: "1950-е",  color: "#E8304A",
    desc: "Электрифицированный блюз + кантри. Элвис, Чак Берри — первые звёзды нового звука молодёжи." },
  { name: "Регги",       city: "Кингстон, Ямайка",        lon: -76.8, lat: 18.0,
    year: "1960-е",  color: "#7BC67E",
    desc: "Вырос из ska и rocksteady в трущобах Кингстона. Религия растафари + борьба с колониализмом." },
  { name: "Панк",        city: "Лондон, Великобритания",  lon: -0.1,  lat: 51.5,
    year: "1975-77", color: "#FF6B35",
    desc: "Ответ на безработицу и скуку Британии эпохи Тэтчер. «Нет будущего» — Sex Pistols, 1977." },
  { name: "Хип-хоп",     city: "Бронкс, Нью-Йорк, США",  lon: -73.9, lat: 40.8,
    year: "1973",    color: "#C67BCC",
    desc: "DJ Kool Herc, 1973: первая вечеринка в Бронксе с зацикленными брейками. Музыка кварталов без денег." },
  { name: "Техно",       city: "Детройт, США",            lon: -83.0, lat: 42.3,
    year: "1980-е",  color: "#4AC8E8",
    desc: "Заброшенные заводы, безработица, синтезаторы. Три черных парня — Belleville Three — создали жанр." },
  { name: "Метал",       city: "Бирмингем, Великобритания",lon: -1.9,  lat: 52.5,
    year: "1969-70", color: "#A0A0B0",
    desc: "Black Sabbath, 1970 — тяжёлый звук из рабочего города. Заводской шум превратился в музыку." },
  { name: "K-pop",       city: "Сеул, Южная Корея",        lon: 126.9, lat: 37.5,
    year: "1990-е",  color: "#FF85A1",
    desc: "Государственная программа после кризиса 1997 года. Корея решила экспортировать культуру как товар." },
  { name: "Самба",       city: "Рио-де-Жанейро, Бразилия", lon: -43.2, lat: -22.9,
    year: "~1910-е", color: "#F5C842",
    desc: "Африканские ритмы + португальская мелодика в фавелах Рио. Стала символом бразильской идентичности." },
  { name: "Фламенко",    city: "Андалусия, Испания",        lon: -5.9,  lat: 37.4,
    year: "~XVIII в", color: "#E05C3A",
    desc: "Смесь цыганской, арабской и испанской традиций. Музыка отверженных — цыган и морисков." },
  { name: "Фанк",        city: "Огайо / Джорджия, США",    lon: -82.9, lat: 34.0,
    year: "1960-е",  color: "#A0D468",
    desc: "Джеймс Браун трансформировал соул в ритм-машину. Основа современной поп- и танцевальной музыки." },
  { name: "Блэк-метал",  city: "Осло, Норвегия",            lon: 10.7,  lat: 59.9,
    year: "1991-93", color: "#6B6B8A",
    desc: "Тёмные леса, языческие образы, антихристианский протест. Burzum, Mayhem — скандинавский феномен." },
  { name: "Трэш-метал",  city: "Сан-Франциско / LA, США",   lon: -122.4, lat: 37.7,
    year: "1983",    color: "#8A8A9A",
    desc: "Metallica, Slayer, Megadeth — быстрее и злее обычного метала. Холодная война и ядерный страх." },
  { name: "Электро / EDM",city: "Чикаго / Берлин",           lon: 13.4,  lat: 52.5,
    year: "1985-90", color: "#58C8FF",
    desc: "Чикагское хаус-движение + берлинский техно-андеграунд после падения стены. Клубная культура мира." },
];

const isoMap = {
  "246":"FIN","578":"NOR","752":"SWE","352":"ISL","208":"DNK",
  "840":"USA","276":"DEU","826":"GBR","076":"BRA","124":"CAN",
  "036":"AUS","528":"NLD","380":"ITA","250":"FRA","724":"ESP",
  "616":"POL","756":"CHE","040":"AUT","056":"BEL","203":"CZE",
  "300":"GRC","620":"PRT","032":"ARG","484":"MEX","170":"COL",
  "152":"CHL","392":"JPN","643":"RUS","804":"UKR","348":"HUN",
  "703":"SVK","688":"SRB","191":"HRV","705":"SVN","233":"EST",
  "428":"LVA","440":"LTU","554":"NZL","710":"ZAF","376":"ISR",
  "792":"TUR","360":"IDN","608":"PHL","356":"IND","156":"CHN",
  "410":"KOR","458":"MYS","100":"BGR","642":"ROU","112":"BLR",
  "372":"IRL","604":"PER","862":"VEN","858":"URY","764":"THA",
  "818":"EGY","364":"IRN","388":"JAM"
};

const svg = d3.select("#map");
const proj = d3.geoNaturalEarth1().scale(153).translate([480, 250]);
const path = d3.geoPath().projection(proj);
const tooltip = document.getElementById("tooltip");

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(world => {
  const countries = topojson.feature(world, world.objects.countries);

  svg.selectAll(".country-path")
    .data(countries.features)
    .join("path")
    .attr("class", "country-path")
    .attr("d", path);

  svg.append("path")
    .datum(topojson.mesh(world, world.objects.countries, (a,b) => a !== b))
    .attr("fill", "none")
    .attr("stroke", "#e0e0e0")
    .attr("stroke-width", 0.4)
    .attr("d", path);

  const wrap = document.getElementById("map-wrap");

  genres.forEach(g => {
    const [cx, cy] = proj([g.lon, g.lat]);

    svg.append("circle")
      .attr("class", "genre-dot")
      .attr("cx", cx).attr("cy", cy)
      .attr("r", 8)
      .attr("fill", g.color)
      .attr("fill-opacity", 0.85)
      .attr("stroke", "#fff")
      .attr("stroke-width", 1.5)
      .on("mousemove", function(event) {
        document.getElementById("tt-genre").textContent = g.name;
        document.getElementById("tt-genre").style.color = g.color;
        document.getElementById("tt-city").textContent = g.city + " · " + g.year;
        document.getElementById("tt-desc").textContent = g.desc;
        const r = wrap.getBoundingClientRect();
        let tx = event.clientX - r.left + 14;
        let ty = event.clientY - r.top - 10;
        if (tx > r.width - 240) tx -= 250;
        tooltip.style.left = tx + "px";
        tooltip.style.top = ty + "px";
        tooltip.style.display = "block";
      })
      .on("mouseleave", () => { tooltip.style.display = "none"; });

    svg.append("text")
      .attr("x", cx)
      .attr("y", cy - 12)
      .attr("text-anchor", "middle")
      .attr("font-size", "8px")
      .attr("font-weight", "bold")
      .attr("fill", g.color)
      .attr("pointer-events", "none")
      .attr("paint-order", "stroke")
      .attr("stroke", "#f5f5f5")
      .attr("stroke-width", 3)
      .text(g.name);
  });
});

const legend = document.getElementById("legend");
genres.forEach(g => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `<div class="legend-dot" style="background:${g.color}"></div>${g.name} <span style="color:#555;font-size:11px">${g.year}</span>`;
  legend.appendChild(item);
});
</script>
</body>
</html>
